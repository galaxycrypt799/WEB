name: coffee_admin
description: "Coffee admin app for managing orders and inventory."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.6.0
  path: ^1.8.3

  image_picker: ^1.2.1
  intl: ^0.20.2

  # Navigation
  go_router: ^10.1.2
  url_strategy: ^0.2.0

  # BLOC
  flutter_bloc: ^8.1.1
  bloc: ^8.1.1
  equatable: ^2.0.5

  #Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

  # Charts
  fl_chart: ^0.65.0

  user_repository:
    path: packages/user_repository
  coffee_repository:
    path: packages/coffee_repository


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/coffee/
    - assets/branding/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/DMSans-ExtraBold.ttf
          weight: 800
    - family: DMSerifDisplay
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
